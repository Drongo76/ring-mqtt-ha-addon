name: Ring MQTT (Custom Fork)
version: custom
slug: ring-mqtt
description: Ring MQTT Add-on with RTSP support (custom fork)
url: https://github.com/drongo76/ring-mqtt
arch:
  - aarch64
  - amd64
  - armv7
  - i386
init: false
startup: application
boot: auto
host_network: false
homeassistant_api: true
hassio_api: true
ingress: false
panel_icon: mdi:cctv
map:
  - config:rw
  - ssl:rw
  - share:rw
  - media:rw
options:
  verbose: false
  mqtt_url: mqtt://core-mosquitto
  mqtt_user: ""
  mqtt_pass: ""
  ring_token: ""
  ring_refresh_token: ""
  ring_email: ""
  ring_password: ""
  enable_rtsp: true
  rtsp_port: 8554
  enable_web_ui: true
schema:
  verbose: bool
  mqtt_url: str
  mqtt_user: str?
  mqtt_pass: password?
  ring_token: str?
  ring_refresh_token: str?
  ring_email: str?
  ring_password: password?
  enable_rtsp: bool
  rtsp_port: int
  enable_web_ui: bool
image: "ghcr.io/drongo76/ring-mqtt:custom"
